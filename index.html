<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประกาศผลการเลือกตั้ง สำนักงานคณะกรรมการเลือกตั้ง</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: black;
    color: white;
    overflow: hidden;
    text-align: center;
  }

  #startOverlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    font-size: 18px;
  }

  #runBtn {
    position: absolute;
    padding: 12px 20px;
    font-size: 18px;
    display: none;
  }

  #title {
    margin-top: 80px;
    font-size: 28px;
  }

  /* 🔥 BOX EFFECT */
  #resultBox {
    margin: 30px auto;
    width: 90%;
    max-width: 500px;
    padding: 25px;
    font-size: 22px;
    border: 4px solid gold;
    background: linear-gradient(45deg, red, gold);
    color: white;
    box-shadow: 0 0 25px gold;

    opacity: 0;
    transform: scale(0.8) translateY(40px);
    transition: all 0.8s ease;

    display: block;
  }

  #resultBox.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  /* ✍️ signature */
  #signature {
    margin-top: 20px;
    width: 80%;
    max-width: 300px;

    opacity: 0;
    transition: opacity 1s ease;
  }

  #signature.show {
    opacity: 1;
  }

  @keyframes glow {
    from { box-shadow: 0 0 10px gold; }
    to { box-shadow: 0 0 30px orange; }
  }
</style>
</head>

<body>

<div id="startOverlay">
  🔊 แตะหน้าจอเพื่อเริ่ม
</div>

<iframe id="bgm"
  width="0"
  height="0"
  frameborder="0"
  allow="autoplay">
</iframe>

<button id="runBtn">กดดูผล</button>

<h1 id="title"></h1>

<div id="resultBox">
  🏆 พรรคที่ชนะการเลือกตั้ง: พรรคยุคสมัยใหม่ 🎉
  <br>
  <img id="signature" src="https://various-maroon-ejy67pncsz.edgeone.app/vot.png">
</div>">
</div>

<script>
const overlay = document.getElementById("startOverlay");
const bgm = document.getElementById("bgm");
const runBtn = document.getElementById("runBtn");
const title = document.getElementById("title");
const resultBox = document.getElementById("resultBox");
const signature = document.getElementById("signature");

let escapeCount = 0;

// 👉 เริ่ม
overlay.addEventListener("click", () => {
  overlay.style.display = "none";

  bgm.src = "https://www.youtube.com/embed/9STODo2IV6I?autoplay=1&loop=1&playlist=9STODo2IV6I";

  runBtn.style.display = "block";
  centerBtn();
});

// 📍 กลางจอ
function centerBtn() {
  runBtn.style.left = (window.innerWidth / 2 - 60) + "px";
  runBtn.style.top = (window.innerHeight / 2) + "px";
}

// 🏃‍♂️ หนี
runBtn.addEventListener("mouseover", moveBtn);
runBtn.addEventListener("touchstart", moveBtn);

function moveBtn() {
  if (escapeCount < 3) {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    runBtn.style.left = x + "px";
    runBtn.style.top = y + "px";

    escapeCount++;
  }
}

// 👉 กดได้
runBtn.addEventListener("click", () => {
  if (escapeCount >= 3) startAnnouncement();
});

// ✨ ประกาศ
function startAnnouncement() {
  runBtn.style.display = "none";

  const text = "ประกาศคณะกรรมการเลือกตั้ง ประกาศผลการเลือกตั้ง แมพทำงานในรั้วตำรวจไทย พ.ศ.๒๕๖๘";
  let i = 0;

  const interval = setInterval(() => {
    title.innerHTML += text[i];
    i++;

    if (i >= text.length) {
      clearInterval(interval);

      setTimeout(() => {
        resultBox.classList.add("show");

        setTimeout(() => {
          signature.classList.add("show");
        }, 600);

      }, 500);
    }
  }, 100);
}
</script>

</body>
</html>
